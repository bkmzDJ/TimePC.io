<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Document</title>
  </head>
  <body class="order-body">
    <main class="main-order">
        <section>
            <img src="./assets/img/card_img/ryzen1.png" alt="">
            <span class="name-ord">Процессор AMD Ryzen 3 3200G OEM</span>
            <hr>
            <span class="price-ord">9890 ₽</span>
            <a href="javascript:history.back()" class="ord-btn">Назад</a>
        </section>
        <section>
            <p><span class="ord-h1">Оформление заказа</span><br><span class="ord-h2">Личные данные</span></p>
            <form action="" class="order-form">
                <label for="tel" class="ord-label">Телефон:
                    <input type="text" id="tel">
                </label>
                <div class="cont-ord">
                    <label for="" class="pay-order">
                            <p>Система быстрых платежей</p>
                            <img src="./assets/img/order_img/spb.png" alt="">
                    </label>
                    <label for="" class="pay-order">
                            <p>Оплата банковской картой</p>
                            <img src="./assets/img/order_img/bank-card.png" alt="">
                    </label>
                    <label for="" class="pay-order">
                            <p>Оплата криптовалютой</p>
                            <img src="./assets/img/order_img/cript.png" alt="">
                    </label>
                </div>
                <button type="submit" class="ord-btn">Оплатить заказ</button>
                <p><span class="mini">Подтверждая заказ, Вы даёте согласие на обработку персональных данных в соответствии с </span>
        <span class="mini"><a href="#">политики конфиденциальности</a> и <a href="#">обработкой персональных данных</a></span></p>
            </form>
        </section>
    </main>
    <script src="./assets/script/script.js"></script>
  </body>
</html>
